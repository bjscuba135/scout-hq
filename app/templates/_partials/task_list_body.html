{% for task in tasks %}
<tr id="task-{{ task.id }}"
    hx-patch="/tasks/{{ task.id }}"
    hx-target="#task-{{ task.id }}"
    hx-swap="outerHTML">
  <td class="priority-{{ task.priority }}">{{ task.priority }}</td>
  <td><a href="/tasks/{{ task.id }}">{{ task.title }}</a></td>
  <td>{{ task.category }}</td>
  <td>{{ task.status }}</td>
  <td>{{ task.due_date or "" }}</td>
</tr>
{% else %}
<tr><td colspan="5">No tasks match the current filters.</td></tr>
{% endfor %}
