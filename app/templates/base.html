<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Scout HQ{% endblock %}</title>

  {# PWA #}
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#7413dc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scout HQ">
  <link rel="apple-touch-icon" href="/static/icon-192.png">

  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body hx-ext="json-enc">
  <header class="site-header">
    <div class="header-inner">
      <span class="logo"><a href="/">🏕 Scout HQ</a></span>
      <span class="group-name">1st Beetley Scout Group</span>
      <span class="header-spacer"></span>
      {% block header_extra %}{% endblock %}
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
