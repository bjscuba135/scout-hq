{% import "_macros.html.j2" as nx %}
{% if popular %}
<div class="nx-card-hd"><h3>Popular in Nexus</h3></div>
<div class="nx-card-bd nx-entity-result-list">
  {% for name in popular %}
  <div class="nx-entity-result-row">
    <a href="/entities/{{ name | urlencode }}" class="nx-ent-tag">
      {{ nx.entity_icon("system", 16) }}
      <span>{{ name }}</span>
    </a>
    {% if name not in pinned_names %}
    <button class="nx-btn secondary nx-btn-sm"
            hx-post="/entities/pin"
            hx-vals='{"entity_name": {{ name | jsonstr }}}'
            hx-target="#pinned-list" hx-swap="innerHTML"
            title="Pin {{ name }}">
      {{ nx.icon("plus", 11) }} Pin
    </button>
    {% else %}
    <span class="nx-pinned-mark" title="Already pinned">Pinned</span>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% else %}
<div class="nx-card-bd" style="color:var(--tx-4);font-size:var(--fs-sm)">
  No entities found in Nexus yet.
</div>
{% endif %}
